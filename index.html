<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morg - Asesoría Logística</title>
    <style>
        /* Eliminamos todos los márgenes y forzamos a que ocupe el 100% de la pantalla */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita barras de desplazamiento externas */
            background-color: #323639; /* Color de fondo oscuro típico de los visores de PDF */
        }

        /* El iframe ocupará todo el espacio disponible sin bordes */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- 
      El atributo src apunta directamente a tu archivo PDF. 
      Debe estar en la misma carpeta que este archivo HTML. 
    -->
    <iframe src="morggreenlink.pdf" title="Presentación Morg Asesoría Logística">
        <!-- Mensaje de respaldo en caso de que el navegador del usuario bloquee iframes o no soporte PDFs nativos -->
        <div style="color: white; text-align: center; font-family: sans-serif; padding-top: 50px;">
            <p>Tu navegador no soporta la visualización directa del PDF.</p>
            <a href="morggreenlink.pdf" style="color: #60a5fa; text-decoration: none; font-weight: bold;">
                Haz clic aquí para descargar la presentación
            </a>
        </div>
    </iframe >

</body>
</html>
