<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morg - Asesoría Logística</title>
    
    <!-- Importamos la librería PDF.js para forzar la lectura del PDF en cualquier dispositivo -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #323639; /* Color oscuro tipo visor de PDF */
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contenedor principal donde se dibujarán las páginas */
        #pdf-container {
            width: 100%;
            max-width: 1200px; /* Ancho máximo para que se vea bien en PC */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilo de cada página del PDF */
        canvas {
            max-width: 100%;
            height: auto;
            margin-bottom: 10px; /* Espacio entre páginas */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); /* Sombra elegante */
        }

        /* Mensaje de carga */
        #loading {
            color: white;
            margin-top: 50px;
            font-size: 1.2rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Mensaje mientras carga el documento -->
    <div id="loading">Cargando presentación de Morg...</div>
    
    <!-- Aquí aparecerán las páginas del PDF automáticamente -->
    <div id="pdf-container"></div>

    <script>
        // Configuración del motor del PDF
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // El nombre de tu archivo exacto
        const pdfUrl = 'pdf/morggreenlink.pdf';
        
        const container = document.getElementById('pdf-container');
        const loading = document.getElementById('loading');

        // Función asíncrona para cargar y renderizar el PDF
        async function renderPDF(url) {
            try {
                // Cargar el documento
                const pdf = await pdfjsLib.getDocument(url).promise;
                
                // Ocultar mensaje de carga
                loading.style.display = 'none';
                
                // Leer y mostrar cada página una por una
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);
                    
                    // Ajustar la calidad (escala)
                    const viewport = page.getViewport({ scale: 1.5 });
                    
                    // Crear un elemento "lienzo" (canvas) para dibujar la página
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    
                    // Insertar la página en la web
                    container.appendChild(canvas);
                    
                    // Renderizar el contenido
                    await page.render({
                        canvasContext: context,
                        viewport: viewport
                    }).promise;
                }
            } catch (error) {
                // Si hay un error (por ejemplo, el PDF no está en la carpeta)
                loading.innerHTML = 'No se pudo cargar el PDF. <br><br> <a href="' + url + '" style="color:#60a5fa; text-decoration:none;">Toca aquí para descargarlo directamente</a>';
                console.error('Error al cargar el PDF:', error);
            }
        }

        // Iniciar el proceso
        renderPDF(pdfUrl);
    </script>

</body>
</html>
